<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
    <title>Notaría 105 - Panel de Control</title>
</head>
<body class="bg-light">

    <div id="navbar-container"></div>

    <main class="container">
        <div class="row mb-4 align-items-center">
            <div class="col-md-8">
                <h2 id="saludo">Hola</h2>
                <p class="text-muted">Panel de Control - Notaría 105</p>
            </div>
            <div class="col-md-4">
                <div class="d-flex gap-2 justify-content-md-end justify-content-center flex-wrap" id="botonesAccion">
                    <!-- se llena por JS según el rol -->
                </div>
            </div>
        </div>

        <div class="row mb-3">
            <div class="col-md-12">
                <div class="input-group shadow-sm">
                    <span class="input-group-text bg-white">🔍</span>
                    <input type="text" id="buscadorDashboard" class="form-control form-control-lg border-start-0" placeholder="Buscar por número de folio, nombre del cliente o tipo de trámite..." onkeyup="filtrarTabla()">
                </div>
            </div>
        </div>

        <div class="card shadow border-dark">
            <div class="card-header bg-dark text-white">
                <h5 class="mb-0">Expedientes Activos</h5>
            </div>
            <div class="card-body p-0">
                <table class="table table-striped table-hover align-middle mb-0" id="tablaTramites">
                    <thead class="table-light">
                        <tr>
                            <th class="ps-3">Folio</th>
                            <th>Trámite y Cliente</th>
                            <th>Estado</th>
                            <th>Costo</th>
                            <th class="text-end pe-3">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="cuerpoTabla">
                        <!-- filas generadas por JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <footer>
        <small>&copy; 2026 - Notaría 105, bases de datos.</small>
    </footer>

    <script src="js/db.js"></script>
    <script src="js/nav.js"></script>
    <script>
        const sesion = requireAuth(null); // cualquier rol logeado puede ver el dashboard

        if (sesion) {
            renderNavbar();
            document.getElementById("saludo").textContent = `Hola, ${sesion.nombre} (${sesion.rol})`;

            // Botones de acción según rol (equivalente a los {% if session.rol %})
            const botonesAccion = document.getElementById("botonesAccion");
            let html = "";
            if (sesion.rol === "Notario") {
                html += `<a href="nuevo_empleado.html" class="btn btn-dark shadow-sm">👥 RRHH</a>`;
                html += `<a href="crear_escritura.html" class="btn btn-success shadow-sm">➕ Crear Escritura</a>`;
                html += `<a href="archivo.html" class="btn btn-secondary shadow-sm">🗄️ Archivo</a>`;
            }
            if (sesion.rol === "Abogado" || sesion.rol === "Notario") {
                html += `<a href="nuevo_cliente.html" class="btn btn-primary shadow-sm">👤 Registrar Cliente</a>`;
            }
            botonesAccion.innerHTML = html;

            renderTabla();
        }

        function renderTabla() {
            const db = getDB();
            const cuerpo = document.getElementById("cuerpoTabla");

            // Equivalente al WHERE E.estado IN ('En redaccion', 'Pendiente de firma')
            const tramites = db.escrituras
                .filter((e) => ["En redaccion", "Pendiente de firma"].includes(e.estado))
                .sort((a, b) => (a.no_escritura < b.no_escritura ? 1 : -1)); // ORDER BY DESC

            if (tramites.length === 0) {
                cuerpo.innerHTML = `
                    <tr>
                        <td colspan="5" class="text-center py-5 text-muted">
                            <div style="font-size: 3rem;">📭</div>
                            No hay trámites activos registrados en el sistema.
                        </td>
                    </tr>`;
                return;
            }

            cuerpo.innerHTML = tramites
                .map((t) => {
                    const tipo = getTipoTramite(db, t.no_escritura);
                    const solicitante = getSolicitantePrincipal(db, t.no_escritura);
                    const nombreCompleto = solicitante ? `${solicitante.nombre} ${solicitante.apellidos}` : "(sin solicitante)";

                    let badgeClase = "bg-secondary";
                    if (t.estado === "Firmada") badgeClase = "bg-success";
                    else if (t.estado === "Cancelada") badgeClase = "bg-danger";
                    else if (t.estado === "Pendiente de firma") badgeClase = "bg-warning text-dark";

                    let acciones = `<button class="btn btn-sm btn-outline-secondary" disabled>Solo Vista</button>`;
                    if (sesion.rol === "Notario") {
                        if (t.estado === "En redaccion") {
                            acciones = `
                                <a href="editar_escritura.html?folio=${t.no_escritura}" class="btn btn-sm btn-primary">📝 Redactar</a>
                                <button class="btn btn-sm btn-danger" onclick="eliminarEscritura('${t.no_escritura}')">🗑️</button>
                            `;
                        } else if (t.estado === "Pendiente de firma") {
                            acciones = `<a href="firmar_escritura.html?folio=${t.no_escritura}" class="btn btn-sm btn-warning text-dark fw-bold">✍️ Firmar</a>`;
                        }
                    }

                    return `
                        <tr>
                            <td class="ps-3"><strong class="text-primary">${t.no_escritura}</strong></td>
                            <td>
                                <span class="fw-bold">${tipo}</span><br>
                                <small class="text-muted">👤 ${nombreCompleto}</small>
                            </td>
                            <td><span class="badge ${badgeClase}">${t.estado}</span></td>
                            <td>$${formatoMoneda(t.costo_total)}</td>
                            <td class="text-end pe-3">${acciones}</td>
                        </tr>
                    `;
                })
                .join("");
        }

        function eliminarEscritura(no_escritura) {
            if (!confirm("¿⚠️ Eliminar permanentemente?")) return;

            const db = getDB();
            db.testamentos = db.testamentos.filter((x) => x.no_escritura !== no_escritura);
            db.fe_hechos = db.fe_hechos.filter((x) => x.no_escritura !== no_escritura);
            db.actas = db.actas.filter((x) => x.no_escritura !== no_escritura);
            db.compraventas = db.compraventas.filter((x) => x.no_escritura !== no_escritura);
            db.pagos = db.pagos.filter((x) => x.no_escritura !== no_escritura);
            db.participaciones = db.participaciones.filter((x) => x.no_escritura !== no_escritura);
            db.escrituras = db.escrituras.filter((x) => x.no_escritura !== no_escritura);
            saveDB(db);

            renderTabla();
        }

        function filtrarTabla() {
            const filtro = document.getElementById("buscadorDashboard").value.toLowerCase();
            const filas = document.querySelectorAll("#tablaTramites tbody tr");
            filas.forEach((fila) => {
                const texto = fila.textContent.toLowerCase();
                fila.style.display = texto.includes(filtro) ? "" : "none";
            });
        }
    </script>
</body>
</html>
