<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
    <title>Notaría 105 - Alta de Personal</title>
</head>
<body class="bg-light">

    <div id="navbar-container"></div>

    <main class="container">
        <div class="row mb-4 align-items-center">
            <div class="col-md-8">
                <h2>Módulo de Recursos Humanos</h2>
                <p class="text-muted">Alta de nuevo personal operativo</p>
            </div>
            <div class="col-md-4 text-end">
                <a href="dashboard.html" class="btn btn-outline-secondary">Volver al Panel</a>
            </div>
        </div>

        <div id="mensaje" class="alert alert-info shadow-sm d-none"></div>

        <div class="card shadow border-dark">
            <div class="card-header bg-dark text-white">
                <h5 class="mb-0">Datos del Nuevo Empleado</h5>
            </div>
            <div class="card-body">
                <form id="formEmpleado">
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Nombre(s)</label>
                            <input type="text" id="nombre" class="form-control" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Apellidos</label>
                            <input type="text" id="apellidos" class="form-control" required>
                        </div>
                    </div>
                    <div class="row mb-3">
                        <div class="col-md-4">
                            <label class="form-label">RFC</label>
                            <input type="text" id="rfc" class="form-control" maxlength="13" required style="text-transform: uppercase;">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">CURP</label>
                            <input type="text" id="curp" class="form-control" maxlength="18" required style="text-transform: uppercase;">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Correo Corporativo</label>
                            <input type="email" id="correo" class="form-control" required>
                        </div>
                    </div>
                    <hr>
                    <div class="row mb-4">
                        <div class="col-md-4">
                            <label class="form-label">Cédula Profesional</label>
                            <input type="text" id="cedula" class="form-control" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Rol en Sistema</label>
                            <select id="rol_sistema" class="form-select" required>
                                <option value="Abogado">Abogado Auxiliar</option>
                                <option value="Notario">Notario Titular</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Contraseña Temporal</label>
                            <input type="password" id="password" class="form-control" required>
                            <small class="text-muted">Se encriptará automáticamente.</small>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-success btn-lg w-100">Registrar y Encriptar</button>
                </form>
            </div>
        </div>
    </main>

    <footer>
        <small>&copy; 2026 - Notaría 105, bases de datos.</small>
    </footer>

    <script src="js/db.js"></script>
    <script src="js/nav.js"></script>
    <script>
        const sesion = requireAuth(["Notario"]);
        if (sesion) renderNavbar();

        document.getElementById("formEmpleado").addEventListener("submit", async (e) => {
            e.preventDefault();

            const nombre = document.getElementById("nombre").value.trim();
            const apellidos = document.getElementById("apellidos").value.trim();
            const rfc = document.getElementById("rfc").value.trim().toUpperCase();
            const curp = document.getElementById("curp").value.trim().toUpperCase();
            const correo = document.getElementById("correo").value.trim();
            const cedula = document.getElementById("cedula").value.trim();
            const rol_sistema = document.getElementById("rol_sistema").value;
            const password = document.getElementById("password").value;

            const db = getDB();
            const mensajeDiv = document.getElementById("mensaje");

            const yaExisteRfc = db.personas.some((p) => p.rfc === rfc);
            const yaExisteCurp = db.personas.some((p) => p.curp === curp);
            const yaExisteCorreo = db.correos.some((c) => c.correo === correo);
            const yaExisteCedula = db.empleados.some((emp) => emp.no_cedula === cedula);

            if (yaExisteRfc || yaExisteCurp || yaExisteCorreo || yaExisteCedula) {
                mensajeDiv.classList.remove("d-none", "alert-info");
                mensajeDiv.classList.add("alert-danger");
                mensajeDiv.textContent = "Error al registrar: Verifica que el RFC, CURP o Correo no estén repetidos.";
                return;
            }

            const nuevoId = db.next_id_persona++;
            db.personas.push({ id_persona: nuevoId, nombre, apellidos, rfc, curp });
            db.correos.push({ id_persona: nuevoId, correo });
            db.empleados.push({
                id_persona: nuevoId,
                no_cedula: cedula,
                contrasena_hash: await hashPassword(password),
                rol_sistema,
            });

            saveDB(db);

            mensajeDiv.classList.remove("d-none", "alert-danger");
            mensajeDiv.classList.add("alert-info");
            mensajeDiv.textContent = "¡Empleado registrado con éxito! Contraseña encriptada.";
            document.getElementById("formEmpleado").reset();
        });
    </script>
</body>
</html>
