<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Escritura</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #525659; padding: 2rem; }
        .hoja-papel {
            background-color: white;
            max-width: 21cm;
            min-height: 29.7cm;
            margin: 0 auto;
            padding: 2.5cm;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            font-family: 'Times New Roman', Times, serif;
            text-align: justify;
            line-height: 1.6;
        }
        .sello-notaria { text-align: center; margin-bottom: 2rem; border-bottom: 2px solid #000; padding-bottom: 1rem; }
        .firma-box { text-align: center; margin-top: 4rem; }
        .firma-img { max-height: 150px; }

        @media print {
            body { background-color: white; padding: 0; }
            .hoja-papel { box-shadow: none; max-width: 100%; min-height: auto; padding: 0; }
            .no-imprimir { display: none !important; }
        }
    </style>
</head>
<body>

    <div class="text-center mb-4 no-imprimir">
        <button onclick="window.print()" class="btn btn-success btn-lg me-2">🖨️ Imprimir / Guardar PDF</button>
        <a href="#" id="linkVolver" class="btn btn-outline-light">Volver</a>
    </div>

    <div class="hoja-papel" id="hojaPapel">
        <!-- contenido generado por JS -->
    </div>

    <script src="js/db.js"></script>
    <script>
        const sesion = requireAuth(null);
        const no_escritura = new URLSearchParams(window.location.search).get("folio");

        if (sesion) {
            const linkVolver = document.getElementById("linkVolver");
            linkVolver.href = sesion.rol === "Cliente" ? "portal_cliente.html" : "archivo.html";
            linkVolver.textContent = sesion.rol === "Cliente" ? "Volver a mis Trámites" : "Volver al Archivo";

            const db = getDB();
            const tramite = db.escrituras.find((e) => e.no_escritura === no_escritura);
            const solicitante = getSolicitantePrincipal(db, no_escritura);
            const participacion = db.participaciones.find(
                (p) => p.no_escritura === no_escritura && p.tipo_participante === "Solicitante Principal"
            );
            const cliente = solicitante ? db.clientes.find((c) => c.id_persona === solicitante.id_persona) : null;

            const testamento = db.testamentos.find((t) => t.no_escritura === no_escritura);
            const feHechos = db.fe_hechos.find((f) => f.no_escritura === no_escritura);
            const acta = db.actas.find((a) => a.no_escritura === no_escritura);
            const compraventa = db.compraventas.find((c) => c.no_escritura === no_escritura);

            const hoja = document.getElementById("hojaPapel");

            if (!tramite || !solicitante || !cliente) {
                hoja.innerHTML = `<p class="text-danger text-center">Error: Documento no encontrado o sin Solicitante Principal.</p>`;
            } else {
                let tituloInstrumento = "INSTRUMENTO NOTARIAL";
                let objetoInstrumento = "";

                if (testamento) {
                    tituloInstrumento = `TESTAMENTO PÚBLICO ${testamento.tipo.toUpperCase()}`;
                    objetoInstrumento = `<p><strong>OBJETO DEL INSTRUMENTO:</strong> El compareciente dicta su disposición testamentaria de última voluntad bajo la modalidad de Testamento Público ${testamento.tipo}.</p>`;
                } else if (feHechos) {
                    tituloInstrumento = "ACTA DE FE DE HECHOS";
                } else if (acta) {
                    tituloInstrumento = "ACTA CONSTITUTIVA DE SOCIEDAD";
                    objetoInstrumento = `<p><strong>OBJETO DEL INSTRUMENTO:</strong> Constitución legal de la entidad moral que llevará por denominación <strong>"${acta.nombre_empresa.toUpperCase()}"</strong>.</p>`;
                } else if (compraventa) {
                    tituloInstrumento = "ESCRITURA DE COMPRAVENTA DE INMUEBLE";
                    objetoInstrumento = `<p><strong>OBJETO DEL INSTRUMENTO:</strong> Transmisión de propiedad respecto al bien inmueble registrado en este padrón bajo el identificador interno: ${compraventa.id_bien}.</p>`;
                }

                const firmaHtml = tramite.firma_b64
                    ? `<img src="${tramite.firma_b64}" class="firma-img" alt="Firma Digital">`
                    : `<div style="height: 150px; display:flex; align-items:flex-end; justify-content:center; color:#999;">[PENDIENTE DE FIRMA AUTÓGRAFA]</div>`;

                hoja.innerHTML = `
                    <div class="sello-notaria">
                        <h2>NOTARÍA PÚBLICA 105</h2>
                        <p class="mb-0">Estado de México | Lic. Roberto Gómez Bolaños</p>
                        <p class="text-muted">Folio de Registro: <strong>${tramite.no_escritura}</strong></p>
                    </div>

                    <p class="text-end">Fecha de Apertura: <strong>${tramite.fecha_apertura}</strong></p>

                    <h4 class="text-center mt-4 mb-4">${tituloInstrumento}</h4>

                    <p>
                        En la ciudad sede de esta Notaría, ante mí, el Notario Titular de la Notaría Pública 105, comparece el C.
                        <strong>${solicitante.nombre.toUpperCase()} ${solicitante.apellidos.toUpperCase()}</strong>,
                        quien se identifica con credencial para votar número <strong>${cliente.ine}</strong>, con Registro Federal de
                        Contribuyentes <strong>${solicitante.rfc}</strong> y CURP <strong>${solicitante.curp}</strong>,
                        manifestando ser de estado civil ${cliente.estado_civil} y de ocupación ${cliente.ocupacion}.
                    </p>

                    ${objetoInstrumento}

                    <h5 class="mt-4">DECLARACIONES Y CLÁUSULAS:</h5>
                    <p style="white-space: pre-wrap; font-style: italic;">${tramite.texto_legal || ""}</p>

                    <p class="mt-5">
                        Leído que fue el presente instrumento y debidamente advertido el compareciente del valor y consecuencias legales del mismo,
                        se manifiesta conforme, ratificándolo y firmándolo digitalmente al calce para constancia.
                    </p>

                    <div class="firma-box">
                        ${firmaHtml}
                        <p class="mt-2 mb-0">_______________________________________</p>
                        <strong>${solicitante.nombre} ${solicitante.apellidos}</strong><br>
                        <small>EL SOLICITANTE</small>
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
