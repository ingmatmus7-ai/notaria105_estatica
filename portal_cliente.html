<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
    <title>Notaría 105 - Mi Portal Ciudadano</title>
</head>
<body class="bg-light">

    <div id="navbar-container"></div>

    <main class="container">
        <div class="row mb-4 align-items-center">
            <div class="col-md-8">
                <h2>Bienvenido a su Portal, <span id="nombreCliente"></span></h2>
                <p class="text-muted">Consulte el avance en tiempo real de sus instrumentos notariales.</p>
            </div>
            <div class="col-md-4 text-end">
                <a href="#" onclick="logout(); return false;" class="btn btn-outline-danger">Cerrar Sesión</a>
            </div>
        </div>

        <div class="row mb-3">
            <div class="col-md-12">
                <div class="input-group shadow-sm">
                    <span class="input-group-text bg-white">🔍</span>
                    <input type="text" id="buscadorCliente" class="form-control form-control-lg border-start-0" placeholder="Buscar por número de folio o tipo de trámite..." onkeyup="filtrarTablaCliente()">
                </div>
            </div>
        </div>

        <div class="card shadow border-primary">
            <div class="card-header bg-primary text-white">
                <h5 class="mb-0">Mis Expedientes Registrados</h5>
            </div>
            <div class="card-body p-0">
                <table class="table table-striped table-hover align-middle mb-0" id="tablaCliente">
                    <thead class="table-light">
                        <tr>
                            <th class="ps-3">Folio de Escritura</th>
                            <th>Tipo de Trámite</th>
                            <th>Estado del Proceso</th>
                            <th>Costo e Historial de Pago</th>
                            <th class="text-end pe-3">Documento Oficial</th>
                        </tr>
                    </thead>
                    <tbody id="cuerpoCliente">
                        <!-- generado por JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <footer>
        <small>&copy; 2026 - Notaría 105, bases de datos.</small>
    </footer>

    <script src="js/db.js"></script>
    <script src="js/nav.js"></script>
    <script>
        const sesion = requireAuth(["Cliente"], "login_cliente.html");

        if (sesion) {
            renderNavbar();
            document.getElementById("nombreCliente").textContent = sesion.nombre;

            const db = getDB();

            const misParticipaciones = db.participaciones.filter((p) => p.id_persona === sesion.user_id);
            const tramites = misParticipaciones
                .map((p) => db.escrituras.find((e) => e.no_escritura === p.no_escritura))
                .filter(Boolean)
                .sort((a, b) => (a.no_escritura < b.no_escritura ? 1 : -1));

            const cuerpo = document.getElementById("cuerpoCliente");

            if (tramites.length === 0) {
                cuerpo.innerHTML = `
                    <tr>
                        <td colspan="5" class="text-center py-5 text-muted">
                            <div style="font-size: 3rem;">📂</div>
                            No se encontraron trámites activos vinculados a sus datos de acceso.
                        </td>
                    </tr>`;
            } else {
                cuerpo.innerHTML = tramites
                    .map((t) => {
                        const tipo = getTipoTramite(db, t.no_escritura);
                        let badgeClase = "bg-secondary";
                        if (t.estado === "Firmada") badgeClase = "bg-success";
                        else if (t.estado === "Cancelada") badgeClase = "bg-danger";
                        else if (t.estado === "Pendiente de firma") badgeClase = "bg-warning text-dark";

                        const pagoTexto = ["Pendiente de firma", "Firmada"].includes(t.estado)
                            ? `<small class="text-success fw-bold">● Pago Registrado e Identificado</small>`
                            : `<small class="text-muted">○ Liquidación en Ventanilla Notarial</small>`;

                        const accionDoc =
                            t.estado === "Firmada"
                                ? `<a href="documento_oficial.html?folio=${t.no_escritura}" class="btn btn-sm btn-success fw-bold">📄 Descargar Escritura</a>`
                                : `<button class="btn btn-sm btn-outline-secondary" disabled>⏳ En revisión por el Notario</button>`;

                        return `
                            <tr>
                                <td class="ps-3"><strong class="text-primary">${t.no_escritura}</strong></td>
                                <td><span class="fw-bold text-dark">${tipo}</span></td>
                                <td><span class="badge ${badgeClase}">${t.estado}</span></td>
                                <td>
                                    <span class="text-muted">$${formatoMoneda(t.costo_total)}</span><br>
                                    ${pagoTexto}
                                </td>
                                <td class="text-end pe-3">${accionDoc}</td>
                            </tr>
                        `;
                    })
                    .join("");
            }
        }

        function filtrarTablaCliente() {
            const filtro = document.getElementById("buscadorCliente").value.toLowerCase();
            const filas = document.querySelectorAll("#tablaCliente tbody tr");
            filas.forEach((fila) => {
                const texto = fila.textContent.toLowerCase();
                fila.style.display = texto.includes(filtro) ? "" : "none";
            });
        }
    </script>
</body>
</html>
