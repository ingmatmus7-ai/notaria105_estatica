<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
    <title>Notaría 105 - Recabar Firma</title>
</head>
<body class="bg-light">

    <div id="navbar-container"></div>

    <main class="container">
        <div class="row justify-content-center mb-4">
            <div class="col-md-8 text-center">
                <h2>Firma Autógrafa Digital</h2>
                <p class="text-muted">Trámite: <strong id="folioTitulo"></strong> | Cliente: <strong id="clienteTitulo"></strong></p>
            </div>
        </div>

        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow border-warning">
                    <div class="card-header bg-warning text-dark fw-bold text-center">
                        ✍️ Área de Firma para el Cliente
                    </div>
                    <div class="card-body text-center bg-light">
                        <p class="small text-muted mb-2">Por favor, firme dentro del recuadro blanco usando su dedo o el puntero.</p>

                        <canvas id="pizarra" width="600" height="300" class="border rounded bg-white shadow-sm" style="touch-action: none; cursor: crosshair;"></canvas>

                        <div class="mt-3">
                            <button type="button" class="btn btn-outline-danger me-2" onclick="limpiarPizarra()">Borrar y reintentar</button>
                            <button type="button" class="btn btn-success" onclick="guardarFirma()">Confirmar y Sellar Escritura</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <small>&copy; 2026 - Notaría 105, bases de datos.</small>
    </footer>

    <script src="js/db.js"></script>
    <script src="js/nav.js"></script>
    <script>
        const sesion = requireAuth(["Notario"]);
        const no_escritura = new URLSearchParams(window.location.search).get("folio");

        if (sesion) {
            renderNavbar();

            const db = getDB();
            const tramite = db.escrituras.find((e) => e.no_escritura === no_escritura);
            if (tramite) {
                const solicitante = getSolicitantePrincipal(db, no_escritura);
                document.getElementById("folioTitulo").textContent = tramite.no_escritura;
                document.getElementById("clienteTitulo").textContent = solicitante
                    ? `${solicitante.nombre} ${solicitante.apellidos}`
                    : "(sin solicitante)";
            } else {
                document.querySelector("main").innerHTML = `<div class="alert alert-danger mt-4">Trámite no encontrado.</div>`;
            }
        }

        const canvas = document.getElementById('pizarra');
        const ctx = canvas.getContext('2d');
        let dibujando = false;

        ctx.lineWidth = 3;
        ctx.lineCap = 'round';
        ctx.strokeStyle = '#000000';

        const empezarDibujo = (e) => {
            dibujando = true;
            ctx.beginPath();
            ctx.moveTo(obtenerX(e), obtenerY(e));
            e.preventDefault();
        };

        const dibujar = (e) => {
            if (!dibujando) return;
            ctx.lineTo(obtenerX(e), obtenerY(e));
            ctx.stroke();
            e.preventDefault();
        };

        const detenerDibujo = () => {
            dibujando = false;
            ctx.closePath();
        };

        const obtenerX = (e) => e.touches ? e.touches[0].clientX - canvas.getBoundingClientRect().left : e.clientX - canvas.getBoundingClientRect().left;
        const obtenerY = (e) => e.touches ? e.touches[0].clientY - canvas.getBoundingClientRect().top : e.clientY - canvas.getBoundingClientRect().top;

        canvas.addEventListener('mousedown', empezarDibujo);
        canvas.addEventListener('mousemove', dibujar);
        canvas.addEventListener('mouseup', detenerDibujo);
        canvas.addEventListener('mouseout', detenerDibujo);

        canvas.addEventListener('touchstart', empezarDibujo);
        canvas.addEventListener('touchmove', dibujar);
        canvas.addEventListener('touchend', detenerDibujo);

        function limpiarPizarra() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        function guardarFirma() {
            const imagenBase64 = canvas.toDataURL('image/png');

            const db = getDB();
            const idx = db.escrituras.findIndex((e) => e.no_escritura === no_escritura);
            if (idx === -1) return;

            db.escrituras[idx].firma_b64 = imagenBase64;
            db.escrituras[idx].estado = 'Firmada';
            saveDB(db);

            window.location.href = `documento_oficial.html?folio=${no_escritura}`;
        }
    </script>
</body>
</html>
