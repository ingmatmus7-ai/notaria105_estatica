<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
    <title>Notaría 105 - Archivo Notarial</title>
</head>
<body class="bg-light">

    <div id="navbar-container"></div>

    <main class="container">
        <div class="row mb-4 align-items-center">
            <div class="col-md-8">
                <h2>🗄️ Archivos</h2>
                <p class="text-muted">Escrituras finalizadas y trámites cancelados.</p>
            </div>
            <div class="col-md-4 text-end">
                <a href="dashboard.html" class="btn btn-outline-primary">Volver al Panel Operativo</a>
            </div>
        </div>

        <div class="row mb-3">
            <div class="col-md-12">
                <div class="input-group shadow-sm">
                    <span class="input-group-text bg-white">🔍</span>
                    <input type="text" id="buscadorArchivo" class="form-control form-control-lg border-start-0" placeholder="Buscar por número de folio, nombre del cliente o tipo de trámite..." onkeyup="filtrarTablaArchivo()">
                </div>
            </div>
        </div>

        <div class="card shadow border-secondary">
            <div class="card-header bg-secondary text-white">
                <h5 class="mb-0">Expedientes Cerrados</h5>
            </div>
            <div class="card-body p-0">
                <table class="table table-striped table-hover align-middle mb-0" id="tablaArchivo">
                    <thead class="table-light">
                        <tr>
                            <th class="ps-3">Folio</th>
                            <th>Trámite y Cliente</th>
                            <th>Estado Final</th>
                            <th>Costo</th>
                            <th class="text-end pe-3">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="cuerpoArchivo">
                        <!-- generado por JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <footer>
        <small>&copy; 2026 - Notaría 105, bases de datos.</small>
    </footer>

    <script src="js/db.js"></script>
    <script src="js/nav.js"></script>
    <script>
        const sesion = requireAuth(["Notario"]);

        if (sesion) {
            renderNavbar();

            const db = getDB();
            const tramites = db.escrituras
                .filter((e) => ["Firmada", "Cancelada"].includes(e.estado))
                .sort((a, b) => (a.no_escritura < b.no_escritura ? 1 : -1));

            const cuerpo = document.getElementById("cuerpoArchivo");

            if (tramites.length === 0) {
                cuerpo.innerHTML = `
                    <tr>
                        <td colspan="5" class="text-center py-5 text-muted">
                            <div style="font-size: 3rem;">📭</div>
                            No hay expedientes en el archivo.
                        </td>
                    </tr>`;
            } else {
                cuerpo.innerHTML = tramites
                    .map((t) => {
                        const tipo = getTipoTramite(db, t.no_escritura);
                        const solicitante = getSolicitantePrincipal(db, t.no_escritura);
                        const nombreCompleto = solicitante ? `${solicitante.nombre} ${solicitante.apellidos}` : "(sin solicitante)";
                        const badgeClase = t.estado === "Firmada" ? "bg-success" : "bg-danger";
                        const acciones =
                            t.estado === "Firmada"
                                ? `<a href="documento_oficial.html?folio=${t.no_escritura}" class="btn btn-sm btn-outline-success">📄 Descargar PDF</a>`
                                : `<button class="btn btn-sm btn-outline-secondary" disabled>Sin Documento</button>`;

                        return `
                            <tr>
                                <td class="ps-3"><strong class="text-secondary">${t.no_escritura}</strong></td>
                                <td>
                                    <span class="fw-bold">${tipo}</span><br>
                                    <small class="text-muted">👤 ${nombreCompleto}</small>
                                </td>
                                <td><span class="badge ${badgeClase}">${t.estado}</span></td>
                                <td>$${formatoMoneda(t.costo_total)}</td>
                                <td class="text-end pe-3">${acciones}</td>
                            </tr>
                        `;
                    })
                    .join("");
            }
        }

        function filtrarTablaArchivo() {
            const filtro = document.getElementById("buscadorArchivo").value.toLowerCase();
            const filas = document.querySelectorAll("#tablaArchivo tbody tr");
            filas.forEach((fila) => {
                const texto = fila.textContent.toLowerCase();
                fila.style.display = texto.includes(filtro) ? "" : "none";
            });
        }
    </script>
</body>
</html>
