<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
    <title>Notaría 105 - Apertura de Escritura</title>
</head>
<body class="bg-light">

    <div id="navbar-container"></div>

    <main class="container">
        <div class="row mb-4 align-items-center">
            <div class="col-md-8">
                <h2>Área de Redacción Notarial</h2>
                <p class="text-muted">Apertura de nuevos trámites y asignación de folios.</p>
            </div>
            <div class="col-md-4 text-end">
                <a href="dashboard.html" class="btn btn-outline-secondary">Volver al Panel</a>
            </div>
        </div>

        <div id="mensaje" class="alert alert-danger shadow-sm fw-bold d-none"></div>

        <div class="card shadow border-success">
            <div class="card-header bg-success text-white">
                <h5 class="mb-0">Configuración del Nuevo Trámite</h5>
            </div>
            <div class="card-body">
                <form id="formEscritura">

                    <div class="mb-4">
                        <label class="form-label fw-bold">1. Seleccionar Cliente Titular</label>
                        <select id="id_cliente" class="form-select form-select-lg" required>
                            <option value="" selected disabled>Elige a un cliente registrado...</option>
                            <!-- opciones generadas por JS -->
                        </select>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold">2. Tipo de Acto Jurídico</label>
                        <select id="tipo_tramite" class="form-select form-select-lg" required onchange="mostrarCamposExtra()">
                            <option value="" selected disabled>¿Qué trámite se va a realizar?</option>
                            <option value="Testamento">Testamento Público Abierto</option>
                            <option value="Fe de Hechos">Fe de Hechos / Certificación</option>
                            <option value="Acta Constitutiva">Acta Constitutiva (Creación de Empresa)</option>
                            <option value="Compraventa">Compraventa de Inmueble</option>
                        </select>
                    </div>

                    <div id="campo_empresa" class="mb-4 p-3 bg-light border rounded" style="display: none;">
                        <label class="form-label fw-bold text-primary">Nombre de la Nueva Empresa</label>
                        <input type="text" id="nombre_empresa" class="form-control" placeholder="Ej. Constructora del Norte S.A. de C.V.">
                    </div>

                    <div id="campo_inmueble" class="mb-4 p-3 bg-light border rounded" style="display: none;">
                        <label class="form-label fw-bold text-primary">Seleccionar Bien Inmueble a Vender/Comprar</label>
                        <select id="id_bien" class="form-select">
                            <!-- opciones generadas por JS -->
                        </select>
                        <small class="text-muted">Mostrando catálogo de propiedades registradas.</small>
                    </div>

                    <button type="submit" class="btn btn-success btn-lg w-100">Generar Folio y Aperturar Escritura</button>
                </form>
            </div>
        </div>
    </main>

    <footer>
        <small>&copy; 2026 - Notaría 105, bases de datos.</small>
    </footer>

    <script src="js/db.js"></script>
    <script src="js/nav.js"></script>
    <script>
        const sesion = requireAuth(["Notario"]);

        if (sesion) {
            renderNavbar();

            const db = getDB();

            const selectCliente = document.getElementById("id_cliente");
            if (db.clientes.length === 0) {
                const opt = document.createElement("option");
                opt.value = "";
                opt.textContent = "No hay clientes registrados todavía";
                opt.disabled = true;
                selectCliente.appendChild(opt);
            }
            db.clientes.forEach((c) => {
                const persona = getPersona(db, c.id_persona);
                if (!persona) return;
                const opt = document.createElement("option");
                opt.value = persona.id_persona;
                opt.textContent = `${persona.nombre} ${persona.apellidos} (CURP: ${persona.curp})`;
                selectCliente.appendChild(opt);
            });

            const selectBien = document.getElementById("id_bien");
            db.bienes.forEach((b) => {
                const opt = document.createElement("option");
                opt.value = b.id_bien;
                opt.textContent = `${b.direccion} (Folio: ${b.folio_real})`;
                selectBien.appendChild(opt);
            });

            document.getElementById("formEscritura").addEventListener("submit", (e) => {
                e.preventDefault();

                const mensajeDiv = document.getElementById("mensaje");
                const id_cliente_raw = document.getElementById("id_cliente").value;
                const tipo_tramite = document.getElementById("tipo_tramite").value;

                if (!id_cliente_raw || !tipo_tramite) {
                    mensajeDiv.textContent = "Selecciona un cliente y un tipo de trámite.";
                    mensajeDiv.classList.remove("d-none");
                    return;
                }

                const id_cliente = Number(id_cliente_raw);
                const costo_base = 5000.0;

                const dbActual = getDB();
                const no_escritura = generarFolio(dbActual);

                dbActual.escrituras.push({
                    no_escritura,
                    id_empleado: sesion.user_id,
                    fecha_apertura: new Date().toISOString().slice(0, 10),
                    estado: "En redaccion",
                    costo_total: costo_base,
                    texto_legal: "",
                    firma_b64: null,
                });

                dbActual.participaciones.push({
                    id_persona: id_cliente,
                    no_escritura,
                    tipo_participante: "Solicitante Principal",
                });

                if (tipo_tramite === "Testamento") {
                    dbActual.testamentos.push({ no_escritura, tipo: "Abierto" });
                } else if (tipo_tramite === "Fe de Hechos") {
                    dbActual.fe_hechos.push({ no_escritura, lugar_hechos: "Oficinas de la Notaría 105" });
                } else if (tipo_tramite === "Acta Constitutiva") {
                    const empresa = document.getElementById("nombre_empresa").value.trim() || "Empresa S.A. de C.V.";
                    dbActual.actas.push({ no_escritura, nombre_empresa: empresa });
                } else if (tipo_tramite === "Compraventa") {
                    const id_bien = Number(document.getElementById("id_bien").value);
                    dbActual.compraventas.push({ no_escritura, id_bien });
                }

                saveDB(dbActual);

                window.location.href = `editar_escritura.html?folio=${no_escritura}`;
            });
        }

        function mostrarCamposExtra() {
            const tipo = document.getElementById("tipo_tramite").value;
            document.getElementById("campo_empresa").style.display = tipo === "Acta Constitutiva" ? "block" : "none";
            document.getElementById("campo_inmueble").style.display = tipo === "Compraventa" ? "block" : "none";
        }
    </script>
</body>
</html>
